<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer CRM</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f7f7f8;
      margin: 0;
      padding: 40px 20px;
      color: #222;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      line-height: 1.7;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      background: #eef4ff;
      color: #2f5bd3;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">準備中</div>
    <h1>顧客管理CRM</h1>
    <p>Cloudflare Pages への初回デプロイ確認ページです。</p>
    <p>次に、顧客一覧画面・顧客詳細画面・予約履歴画面を追加していきます。</p>
  </div>
</body>
</html>
